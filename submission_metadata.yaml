methodology_summary: |
Built an AI-driven candidate ranking system for the Senior AI Engineer role.
The ranking pipeline uses six weighted components:
Skills Match (32%), Career Trajectory (25%), Experience Fit (15%),
Behavioral Signals (18%), Education (5%), and Location/Notice Period (5%).

The system evaluates candidate skills, proficiency, endorsements,
career progression, company experience, recruiter engagement metrics,
availability signals, education background, and geographic fit.

Candidates are scored using a weighted composite ranking model and
the Top 100 candidates are selected based on final ranking scores.

